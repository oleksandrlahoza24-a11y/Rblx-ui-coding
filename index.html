<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAM — Pro Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --amber: #fd0000;
      --amber-dim: #3b0000;
      --amber-glow: #950000;
      --red: #d20000;
      --panel: #000000;
      --panel-border: rgba(255, 255, 255, 0.08);
      --glass: #4d0000;
      --text: #ffffff;
      --text-dim: #ffffff;
      --mono: 'Syne Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 30px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: var(--sans);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /* ── VIEWFINDER ── */
    #viewfinder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── ASPECT MASK ── */
    #aspect-mask-top,
    #aspect-mask-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      background: #000;
      z-index: 2;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #aspect-mask-top {
      top: 0;
    }

    #aspect-mask-bottom {
      bottom: 0;
    }

    /* ── GRID OVERLAY ── */
    #grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #grid-overlay.visible {
      opacity: 1;
    }

    #grid-overlay svg {
      width: 100%;
      height: 100%;
    }

    /* ── AE/AF FOCUS RING ── */
    #focus-ring {
      position: absolute;
      z-index: 4;
      width: 70px;
      height: 70px;
      border: 1.5px solid var(--amber);
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.5);
      will-change: transform, opacity;
      transition: opacity 0.16s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #focus-ring::before,
    #focus-ring::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
    }

    #focus-ring::before {
      top: -4px;
      left: -4px;
      border-top: 2px solid var(--amber);
      border-left: 2px solid var(--amber);
    }

    #focus-ring::after {
      bottom: -4px;
      right: -4px;
      border-bottom: 2px solid var(--amber);
      border-right: 2px solid var(--amber);
    }

    #focus-ring.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #focus-ring.locked {
      border-color: var(--amber);
      animation: lock-pulse 2s ease infinite;
    }

    @keyframes lock-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 var(--amber-glow);
      }

      50% {
        box-shadow: 0 0 0 6px transparent;
      }
    }

    /* ── AE LOCK BADGE ── */
    #ae-lock-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--amber);
      color: #000;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 4px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #ae-lock-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FLASH ── */
    #flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #ffffff 0%, #fffbe6 60%, #fff8d0 100%);
      opacity: 0;
      z-index: 6;
      pointer-events: none;
      transition: opacity 0.06s ease-out;
    }

    /* ── OVERLAY PERMISSION ── */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      text-align: center;
      padding: 40px;
    }

    #overlay .cam-logo {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--amber);
      margin-bottom: 32px;
    }

    #overlay h1 {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 26px;
      margin-bottom: 10px;
    }

    #overlay p {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    #overlay button {
      padding: 14px 32px;
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    #overlay button:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    /* ── REVIEW OVERLAY ── */
    #review-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    #review-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #review-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 6px;
    }

    #review-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 32px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .review-btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--panel-border);
      padding: 11px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.18s ease, box-shadow 0.18s ease;
      backdrop-filter: blur(12px);
    }

    /* close: slides left and shrinks */
    #close-review-btn:active {
      transform: translateX(-6px) scale(0.92);
    }

    /* save: bounces up like a save-to-cloud lift */
    #save-review-btn:active {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 8px 20px rgba(253, 0, 0, 0.3);
    }

    .review-btn.save {
      color: var(--amber);
      border-color: var(--amber-glow);
    }

    /* ── TOP INFO BAR ── */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 52px 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
    }

    .top-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-pill {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--panel-border);
      color: rgba(255, 255, 255, 0.6);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ratio btn: squish horizontally */
    #ratio-btn:active {
      transform: scaleX(0.82) scaleY(1.08);
    }

    /* grid btn: spin-flash */
    #grid-btn:active {
      transform: rotate(20deg) scale(0.88);
    }

    /* timer btn: stretch up like a countdown tick */
    #timer-btn:active {
      transform: scaleY(0.78) scaleX(1.06);
    }

    .top-pill.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    /* grid active: subtle grid-line shimmer */
    #grid-btn.active {
      animation: grid-shimmer 2.4s linear infinite;
    }

    @keyframes grid-shimmer {

      0%,
      100% {
        box-shadow: 0 0 0 0 transparent;
      }

      50% {
        box-shadow: 0 0 8px 1px var(--amber-glow);
      }
    }

    /* timer active: pulse like a heartbeat */
    #timer-btn.active {
      animation: timer-heartbeat 1s ease infinite;
    }

    @keyframes timer-heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      14% {
        transform: scale(1.1);
      }

      28% {
        transform: scale(1);
      }

      42% {
        transform: scale(1.06);
      }

      56% {
        transform: scale(1);
      }
    }

    #photo-counter {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
    }

    #photo-counter span {
      color: var(--text);
    }

    /* ── ZOOM BAR ── */
    #zoom-bar {
      position: absolute;
      left: 50%;
      bottom: 185px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 30px;
      transition: opacity var(--transition);
    }

    #zoom-bar.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #zoom-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 0.12em;
      min-width: 36px;
      text-align: right;
    }

    #zoom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #zoom-slider::-webkit-slider-thumb:active {
      transform: scale(1.3);
    }

    /* ── TIMER COUNTDOWN ── */
    #timer-display {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 80px;
      color: var(--amber);
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 40px var(--amber-glow);
      transition: opacity 0.2s ease;
    }

    #timer-display.show {
      opacity: 1;
    }

    /* ── BOTTOM CONTROLS ── */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 0 50px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75), transparent);
      z-index: 10;
    }

    /* mode strip */
    #mode-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin-bottom: 18px;
      position: relative;
    }

    .mode-tab {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.45);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: color 0.22s ease, background 0.22s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mode-tab:active {
      transform: scale(0.92);
    }

    .mode-tab.active {
      color: var(--amber);
      background: var(--amber-dim);
      transform: scale(1.08);
    }

    .mode-tab[data-mode="dynamic"] {
      color: rgba(255, 180, 0, 0.5);
    }

    .mode-tab[data-mode="dynamic"].active {
      color: #ffb400;
      background: rgba(255, 180, 0, 0.15);
    }

    /* shutter row */
    #shutter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
    }

    /* thumbnail */
    #thumb-wrap {
      width: 52px;
      height: 52px;
      position: relative;
    }

    #galleryPreview {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: #222;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    #galleryPreview:active {
      transform: scale(0.88) rotate(-4deg);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    #galleryPreview.flash-in {
      animation: thumb-pop 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes thumb-pop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.18) rotate(3deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    #photo-count-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-family: var(--mono);
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #photo-count-badge.show {
      opacity: 1;
      transform: scale(1);
    }

    /* shutter */
    #captureBtn {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: transparent;
      border: 2.5px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 0 5px #000, inset 0 0 0 8px rgba(255, 255, 255, 0.9), 0 0 0 0 rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }




    #captureBtn::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }




    #captureBtn.ripple::before {
      inset: -18px;
      border-color: rgba(255, 255, 255, 0.12);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }




    #captureBtn::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }




    #captureBtn:active {
      transform: scale(0.91);
      box-shadow: inset 0 0 0 5px #000, inset 0 0 0 8px rgba(255, 255, 255, 0.6), 0 0 22px rgba(255, 255, 255, 0.18);
    }




    #captureBtn:active::after {
      background: #bbb;
      transform: scale(0.84);
    }

    #captureBtn.recording {
      border-color: var(--red);
    }

    #captureBtn.recording::after {
      background: var(--red);
      border-radius: 6px;
    }

    #captureBtn.timer-running {
      animation: timer-pulse 1s ease infinite;
    }

    @keyframes timer-pulse {

      0%,
      100% {
        box-shadow: inset 0 0 0 5px #000, inset 0 0 0 7px rgba(255, 255, 255, 0.85), 0 0 0 0 var(--amber-glow);
      }

      50% {
        box-shadow: inset 0 0 0 5px #000, inset 0 0 0 7px rgba(255, 255, 255, 0.85), 0 0 0 12px transparent;
      }
    }

    /* side icons */
    .side-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(40, 0, 0, 0.6);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      color: rgba(255, 255, 255, 0.8);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    /* switch camera: full Y-axis flip */
    #switchCameraBtn:active {
      transform: rotateY(180deg) scale(0.9);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #switchCameraBtn.flipping {
      animation: cam-flip 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cam-flip {
      0% {
        transform: rotateY(0deg) scale(1);
      }

      45% {
        transform: rotateY(90deg) scale(0.85);
      }

      55% {
        transform: rotateY(90deg) scale(0.85);
      }

      100% {
        transform: rotateY(0deg) scale(1);
      }
    }

    .side-btn.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    /* ── RIGHT RAIL ── */
    #right-rail {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .rail-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      color: rgba(255, 255, 255, 0.7);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    /* torch: flicker press */
    #torch-btn:active {
      transform: scale(0.84) rotate(-8deg);
    }

    /* torch active: warm glow flicker */
    #torch-btn.active {
      animation: torch-flicker 1.8s ease infinite;
      box-shadow: 0 0 14px 2px rgba(255, 200, 60, 0.35);
      border-color: rgba(255, 200, 60, 0.5);
      color: #ffc83c;
    }

    @keyframes torch-flicker {

      0%,
      100% {
        box-shadow: 0 0 12px 2px rgba(255, 200, 60, 0.3);
      }

      25% {
        box-shadow: 0 0 20px 4px rgba(255, 200, 60, 0.5);
      }

      60% {
        box-shadow: 0 0 8px 1px rgba(255, 200, 60, 0.2);
      }

      80% {
        box-shadow: 0 0 18px 3px rgba(255, 200, 60, 0.4);
      }
    }

    /* AE: rotate on press like a lens dial */
    #ae-btn:active {
      transform: scale(0.88) rotate(45deg);
    }

    /* AE active: slow spin */
    #ae-btn.active {
      animation: ae-spin 4s linear infinite;
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    @keyframes ae-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .rail-btn.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    .rail-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── EXPOSURE BAR ── */
    #expo-bar {
      position: absolute;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      padding: 12px 10px;
      border-radius: 24px;
      transition: opacity 0.22s ease;
    }

    #expo-bar.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #expo-bar svg {
      color: var(--amber);
    }

    #expo-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 2px;
      height: 100px;
    }

    #expo-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #expo-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--amber);
      letter-spacing: 0.1em;
    }

    /* ── QUALITY PILL ── */
    #quality-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
    }

    /* ── KEYBOARD HINT ── */
    #kbd-hint {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.12em;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    /* ── GALLERY OVERLAY ── */
    #gallery-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    #gallery-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #gallery-track {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    #gallery-img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      user-select: none;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.22s ease;
    }

    #gallery-img.slide-left {
      animation: gSlideLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    #gallery-img.slide-right {
      animation: gSlideRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes gSlideLeft {
      from {
        opacity: 0;
        transform: translateX(60px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes gSlideRight {
      from {
        opacity: 0;
        transform: translateX(-60px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    #gallery-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 52px 22px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent);
      z-index: 2;
    }

    #gallery-counter {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.14em;
    }

    #gallery-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
      color: rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #gallery-close:active {
      transform: scale(0.88) rotate(90deg);
    }

    #gallery-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 28px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
      z-index: 2;
    }

    .gal-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--panel-border);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.15s ease;
      backdrop-filter: blur(12px);
    }

    #gal-prev:active {
      transform: translateX(-4px) scale(0.92);
    }

    #gal-next:active {
      transform: translateX(4px) scale(0.92);
    }

    #gal-save:active {
      transform: translateY(-4px) scale(1.05);
      color: var(--amber);
    }

    #gal-delete:active {
      transform: scale(0.88);
      color: var(--red);
    }

    #gal-save {
      color: var(--amber);
      border-color: var(--amber-glow);
    }

    #gal-delete {
      color: rgba(255, 80, 80, 0.7);
    }

    /* ── VIDEO REC BADGE ── */
    #rec-badge {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: #fff;
      background: rgba(210, 0, 0, 0.85);
      padding: 5px 14px;
      border-radius: 20px;
      z-index: 12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #rec-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      animation: rec-blink 1s ease infinite;
    }

    @keyframes rec-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    /* ── AA PILL ── */
    #aa-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <video id="viewfinder" autoplay playsinline muted></video>
  <canvas id="photoCanvas" class="hidden"></canvas>

  <div id="aspect-mask-top"></div>
  <div id="aspect-mask-bottom"></div>

  <div id="grid-overlay">

  <!-- RIGHT RAIL -->

  <!-- EXPOSURE SLIDER -->
  <div id="expo-bar" class="hidden">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

      <div id="gallery-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round">

    </div>

      </div>

      <div class="mode-tab" data-mode="dynamic">

          style="display:inline;vertical-align:middle;margin-right:3px">

  <!-- PERMISSION OVERLAY -->
  <div id="overlay">
    <div class="cam-logo">CAM · PRO</div>
    <h1>Camera Access</h1>
    <p>Grant permission to begin.<br>Make sure you're on HTTPS.</p>
    <button id="startCameraBtn">Allow Camera</button>
  </div>

  <script>
    'use strict';

  // ── DOM REFS ──
  const $ = id => document.getElementById(id);
  const viewfinder      = $('viewfinder');
  const photoCanvas     = $('photoCanvas');
  const captureBtn      = $('captureBtn');
  const switchCameraBtn = $('switchCameraBtn');
  const galleryPreview  = $('galleryPreview');
  const flash           = $('flash');
  const overlay         = $('overlay');
  const startCameraBtn  = $('startCameraBtn');
  const gridOverlay     = $('grid-overlay');
  const gridBtn         = $('grid-btn');
  const ratioBtn        = $('ratio-btn');
  const timerBtn        = $('timer-btn');
  const timerLabel      = $('timer-label');
  const timerDisplay    = $('timer-display');
  const maskTop         = $('aspect-mask-top');
  const maskBottom      = $('aspect-mask-bottom');
  const zoomBar         = $('zoom-bar');
  const zoomSlider      = $('zoom-slider');
  const zoomLabel       = $('zoom-label');
  const focusRing       = $('focus-ring');
  const aeLockBadge     = $('ae-lock-badge');
  const aeBtn           = $('ae-btn');
  const torchBtn        = $('torch-btn');
  const expoBtn         = $('expo-btn');
  const expoBar         = $('expo-bar');
  const expoSlider      = $('expo-slider');
  const expoLabelEl     = $('expo-label');
  const countNum        = $('count-num');
  const countBadge      = $('photo-count-badge');
  const reviewOverlay   = $('review-overlay');
  const reviewImg       = $('review-img');
  const closeReviewBtn  = $('close-review-btn');
  const saveReviewBtn   = $('save-review-btn');
  const qualityBtn      = $('quality-btn');
  const aaBtn           = $('aa-btn');
  const kbdHint         = $('kbd-hint');
  const recBadge        = $('rec-badge');
  const recTime         = $('rec-time');
  const galleryOverlay  = $('gallery-overlay');
  const galleryImg      = $('gallery-img');
  const galleryCounter  = $('gallery-counter');
  const galleryClose    = $('gallery-close');
  const galPrev         = $('gal-prev');
  const galNext         = $('gal-next');
  const galSave         = $('gal-save');
  const galDelete       = $('gal-delete');
  const modeTabs        = document.querySelectorAll('.mode-tab');

  // ── STATE ──
  let currentStream    = null;
  let useFront         = false;
  let showGrid         = false;
  let timerSec         = 0;
  let timerTimeout     = null;
  let isTimerRunning   = false;
  let photoCount       = 0;
  let lastImageData    = null;
  let lastDownloadName = '';
  let aeLocked         = false;
  let torchOn          = false;
  let currentTrack     = null;
  let activeMode       = 'photo';
  let expoVisible      = false;
  let zoomRafId        = null;
  let pendingZoom      = null;
  let aaEnabled        = true;   // anti-aliasing on by default
  // video recording
  let mediaRecorder    = null;
  let recChunks        = [];
  let recStartTime     = 0;
  let recTimerInt      = null;
  // gallery
  const gallery        = [];    // { dataUrl, name, type:'photo'|'video' }
  let galIdx           = 0;

  const ratios      = ['4:3', '16:9', '1:1'];
  const timerStates = [0, 3, 10];
  const qualities   = ['PNG', 'JPG', 'WEBP'];
  const qualityMime = { PNG: 'image/png', JPG: 'image/jpeg', WEBP: 'image/webp' };
  const qualityExt  = { PNG: 'png', JPG: 'jpg', WEBP: 'webp' };
  let ratioIdx   = 0;
  let timerIdx   = 0;
  let qualityIdx = 0;

  // ── HAPTIC ──
  const haptic = (ms = 8) => navigator.vibrate?.(ms);

  // ── ASPECT RATIO MASKS ──
  function applyAspectMask() {
    const vw = window.innerWidth, vh = window.innerHeight;
    let bar = 0;
    if (ratios[ratioIdx] === '16:9') bar = Math.max(0, (vh - vw * 9 / 16) / 2);
    else if (ratios[ratioIdx] === '1:1') bar = Math.max(0, (vh - vw) / 2);
    maskTop.style.height = maskBottom.style.height = bar + 'px';
  }

  ratioBtn.addEventListener('click', () => {
    haptic();
    ratioIdx = (ratioIdx + 1) % ratios.length;
    ratioBtn.textContent = ratios[ratioIdx];
    applyAspectMask();
  });

  // ── GRID ──
  gridBtn.addEventListener('click', () => {
    haptic();
    showGrid = !showGrid;
    gridOverlay.classList.toggle('visible', showGrid);
    gridBtn.classList.toggle('active', showGrid);
  });

  // ── TIMER ──
  timerBtn.addEventListener('click', () => {
    haptic();
    timerIdx = (timerIdx + 1) % timerStates.length;
    timerSec = timerStates[timerIdx];
    timerLabel.textContent = timerSec === 0 ? 'OFF' : timerSec + 'S';
    timerBtn.classList.toggle('active', timerSec > 0);
  });

  // ── QUALITY ──
  qualityBtn.addEventListener('click', () => {
    haptic();
    qualityIdx = (qualityIdx + 1) % qualities.length;
    qualityBtn.textContent = qualities[qualityIdx];
  });

  // ── ANTI-ALIASING TOGGLE ──
  aaBtn.addEventListener('click', () => {
    haptic();
    aaEnabled = !aaEnabled;
    aaBtn.classList.toggle('active', aaEnabled);
  });

  // ── EXPOSURE ──
  expoBtn.addEventListener('click', () => {
    haptic();
    expoVisible = !expoVisible;
    expoBar.classList.toggle('hidden', !expoVisible);
    expoBtn.classList.toggle('active', expoVisible);
  });

  expoSlider.addEventListener('input', () => {
    const v = parseFloat(expoSlider.value).toFixed(1);
    expoLabelEl.textContent = (v >= 0 ? '+' : '') + v;
    const brightness = 1 + parseFloat(v) * 0.3;
    viewfinder.style.filter = `brightness(${brightness})`;
  }, { passive: true });

  // ── ZOOM (RAF-throttled) ──
  function applyZoom(val) {
    if (!currentTrack?.getCapabilities) return;
    try {
      const caps = currentTrack.getCapabilities();
      if (!caps.zoom) return;
      const mapped = caps.zoom.min + ((val - 1) / 4) * (caps.zoom.max - caps.zoom.min);
      currentTrack.applyConstraints({ advanced: [{ zoom: mapped }] });
    } catch(_) {}
  }

  viewfinder.addEventListener('touchstart', () => {
    zoomBar.classList.remove('hidden');
  }, { passive: true });

  zoomSlider.addEventListener('input', () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.textContent = val.toFixed(1) + '×';
    pendingZoom = val;
    if (!zoomRafId) zoomRafId = requestAnimationFrame(() => { applyZoom(pendingZoom); zoomRafId = null; });
  }, { passive: true });

  // ── PINCH TO ZOOM ──
  let pinchDist0 = 0, zoomVal0 = 1;
  viewfinder.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      zoomVal0 = parseFloat(zoomSlider.value);
      zoomBar.classList.remove('hidden');
    }
  }, { passive: true });

  viewfinder.addEventListener('touchmove', e => {
    if (e.touches.length !== 2 || !pinchDist0) return;
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const newZoom = Math.min(5, Math.max(1, zoomVal0 * (dist / pinchDist0)));
    zoomSlider.value = newZoom;
    zoomLabel.textContent = newZoom.toFixed(1) + '×';
    pendingZoom = newZoom;
    if (!zoomRafId) zoomRafId = requestAnimationFrame(() => { applyZoom(pendingZoom); zoomRafId = null; });
  }, { passive: true });

  // ── TAP FOCUS + DOUBLE-TAP AE LOCK ──
  let focusHideTimeout = null, lastTap = 0;
  viewfinder.addEventListener('click', e => {
    const now = Date.now();
    const dbl = now - lastTap < 320;
    lastTap = now;
    if (dbl) {
      aeLocked = !aeLocked;
      aeBtn.classList.toggle('active', aeLocked);
      aeLockBadge.classList.toggle('visible', aeLocked);
      if (aeLocked) {
        focusRing.style.cssText += `left:${e.clientX}px;top:${e.clientY}px`;
        focusRing.classList.add('active', 'locked');
      } else {
        focusRing.classList.remove('locked', 'active');
        aeLockBadge.classList.remove('visible');
      }
      return;
    }
    if (aeLocked) { aeLocked = false; aeBtn.classList.remove('active'); aeLockBadge.classList.remove('visible'); focusRing.classList.remove('locked'); }
    focusRing.style.left = e.clientX + 'px';
    focusRing.style.top  = e.clientY + 'px';
    focusRing.classList.add('active');
    focusRing.classList.remove('locked');
    clearTimeout(focusHideTimeout);
    focusHideTimeout = setTimeout(() => focusRing.classList.remove('active'), 1800);
  });

  aeBtn.addEventListener('click', () => {
    haptic();
    aeLocked = !aeLocked;
    aeBtn.classList.toggle('active', aeLocked);
    aeLockBadge.classList.toggle('visible', aeLocked);
    if (!aeLocked) focusRing.classList.remove('locked', 'active');
  });

  // ── TORCH ──
  torchBtn.addEventListener('click', async () => {
    if (!currentTrack) return;
    try {
      const caps = currentTrack.getCapabilities();
      if (!caps.torch) { torchBtn.style.opacity = '0.3'; return; }
      torchOn = !torchOn;
      await currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
      torchBtn.classList.toggle('active', torchOn);
      haptic(torchOn ? 15 : 8);
    } catch(_) { torchBtn.style.opacity = '0.3'; }
  });

  // ── MODE TABS ──
  modeTabs.forEach(tab => tab.addEventListener('click', () => {
    haptic();
    modeTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeMode = tab.dataset.mode;
    // stop recording if switching away from video mid-record
    if (activeMode !== 'video' && mediaRecorder?.state === 'recording') stopVideo();
  }));

  // ── KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.code === 'Space') { e.preventDefault(); handleShutter(); }
    if (e.code === 'KeyG') gridBtn.click();
    if (e.code === 'KeyT') torchBtn.click();
    if (e.code === 'ArrowLeft'  && galleryOverlay.classList.contains('open')) galPrev.click();
    if (e.code === 'ArrowRight' && galleryOverlay.classList.contains('open')) galNext.click();
    if (e.code === 'Escape'     && galleryOverlay.classList.contains('open')) galleryClose.click();
  });

  document.addEventListener('keydown', () => { kbdHint.style.opacity = '0'; }, { once: true });

  // ── INIT CAMERA ──
  async function initCamera() {
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: useFront ? 'user' : 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });
      currentStream = stream;
      viewfinder.srcObject = stream;
      currentTrack = stream.getVideoTracks()[0];
      overlay.classList.add('hidden');
      viewfinder.style.transform = useFront ? 'scaleX(-1)' : 'scaleX(1)';
      applyAspectMask();
    } catch(err) {
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<div class="cam-logo">CAM · PRO</div><h1>Camera Error</h1><p>${err.message}</p><button onclick="location.reload()">Try Again</button>`;
    }
  }

  // ── CAPTURE HELPERS ──
  function _getQualityArgs() {
    const q = qualities[qualityIdx];
    return { mime: qualityMime[q], ext: qualityExt[q], qual: q === 'JPG' ? 0.92 : undefined };
  }

  // Anti-aliasing: draws at 2× then downsamples to native res
  function _drawFrameAA(ctx, w, h) {
    if (aaEnabled) {
      const scale = 2;
      const sw = w * scale, sh = h * scale;
      // draw at 2× on a scratch canvas
      const scratch = document.createElement('canvas');
      scratch.width = sw; scratch.height = sh;
      const sCtx = scratch.getContext('2d');
      sCtx.imageSmoothingEnabled = true;
      sCtx.imageSmoothingQuality = 'high';
      if (useFront) { sCtx.save(); sCtx.translate(sw, 0); sCtx.scale(-1, 1); }
      sCtx.drawImage(viewfinder, 0, 0, sw, sh);
      if (useFront) sCtx.restore();
      // downsample back to target
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(scratch, 0, 0, sw, sh, 0, 0, w, h);
    } else {
      ctx.imageSmoothingEnabled = false;
      if (useFront) { ctx.save(); ctx.translate(w, 0); ctx.scale(-1, 1); }
      ctx.drawImage(viewfinder, 0, 0, w, h);
      if (useFront) ctx.restore();
    }
  }

  function _finaliseCapture(dataUrl, name, type = 'photo') {
    lastImageData    = dataUrl;
    lastDownloadName = name;
    gallery.push({ dataUrl, name, type });
    photoCount++;
    countNum.textContent    = photoCount;
    countBadge.textContent  = photoCount;
    countBadge.classList.add('show');
    galleryPreview.style.backgroundImage = `url(${dataUrl})`;
    galleryPreview.style.borderColor     = 'var(--amber)';
    galleryPreview.classList.remove('flash-in');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      galleryPreview.classList.add('flash-in');
      setTimeout(() => { galleryPreview.style.borderColor = 'rgba(255,255,255,0.2)'; galleryPreview.classList.remove('flash-in'); }, 600);
    }));
  }

  // ── TAKE PHOTO ──
  function takePhoto() {
    if (!currentStream) return;
    haptic(12);
    captureBtn.classList.add('ripple');
    setTimeout(() => captureBtn.classList.remove('ripple'), 520);
    flash.style.opacity = 1;
    setTimeout(() => { flash.style.opacity = 0; }, 75);

    const { mime, ext, qual } = _getQualityArgs();
    const w = viewfinder.videoWidth, h = viewfinder.videoHeight;
    photoCanvas.width = w; photoCanvas.height = h;
    const ctx = photoCanvas.getContext('2d', { willReadFrequently: false });
    _drawFrameAA(ctx, w, h);
    const ts = Date.now();
    _finaliseCapture(photoCanvas.toDataURL(mime, qual), `CAM_${ts}.${ext}`);
  }

  // ── DYNAMIC PHOTO ──
  function takeDynamicPhoto() {
    if (!currentStream || isTimerRunning) return;
    haptic(20);
    const TOTAL = 5, INTERVAL = 80;
    const w = viewfinder.videoWidth, h = viewfinder.videoHeight;
    const frames = [];
    captureBtn.classList.add('timer-running');
    let f = 0;
    const burst = setInterval(() => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      _drawFrameAA(c.getContext('2d'), w, h);
      frames.push(c);
      if (++f >= TOTAL) { clearInterval(burst); captureBtn.classList.remove('timer-running'); _composeDynamic(frames, w, h); }
    }, INTERVAL);
  }

  function _composeDynamic(frames, w, h) {
    flash.style.opacity = 0.5;
    setTimeout(() => { flash.style.opacity = 0; }, 100);
    const { mime, ext, qual } = _getQualityArgs();
    photoCanvas.width = w; photoCanvas.height = h;
    const ctx = photoCanvas.getContext('2d', { willReadFrequently: false });
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(frames[0], 0, 0);
    for (let i = 1; i < frames.length; i++) { ctx.globalAlpha = 0.28 + (i / frames.length) * 0.45; ctx.drawImage(frames[i], 0, 0); }
    ctx.globalAlpha = 1;
    _finaliseCapture(photoCanvas.toDataURL(mime, qual), `CAM_DYN_${Date.now()}.${ext}`);
  }

  // ── VIDEO RECORDING ──
  function startVideo() {
    if (!currentStream) return;
    recChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    mediaRecorder = new MediaRecorder(currentStream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.onstop = _saveVideo;
    mediaRecorder.start(200); // collect in 200ms chunks
    recStartTime = Date.now();
    recBadge.classList.add('visible');
    captureBtn.classList.add('recording');
    haptic(20);
    recTimerInt = setInterval(() => {
      const s = Math.floor((Date.now() - recStartTime) / 1000);
      recTime.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }, 500);
  }

  function stopVideo() {
    if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
    mediaRecorder.stop();
    recBadge.classList.remove('visible');
    captureBtn.classList.remove('recording');
    clearInterval(recTimerInt);
    haptic(15);
  }

  function _saveVideo() {
    const blob = new Blob(recChunks, { type: 'video/webm' });
    const url  = URL.createObjectURL(blob);
    const name = `CAM_VID_${Date.now()}.webm`;
    // store in gallery as video entry (thumbnail = first frame via canvas)
    const tmpVid = document.createElement('video');
    tmpVid.src = url;
    tmpVid.muted = true;
    tmpVid.playsInline = true;
    tmpVid.onloadeddata = () => {
      tmpVid.currentTime = 0.1;
    };
    tmpVid.onseeked = () => {
      const tc = document.createElement('canvas');
      tc.width = tmpVid.videoWidth || 320; tc.height = tmpVid.videoHeight || 180;
      tc.getContext('2d').drawImage(tmpVid, 0, 0, tc.width, tc.height);
      const thumb = tc.toDataURL('image/jpeg', 0.7);
      gallery.push({ dataUrl: url, thumbUrl: thumb, name, type: 'video' });
      photoCount++;
      countNum.textContent   = photoCount;
      countBadge.textContent = photoCount;
      countBadge.classList.add('show');
      galleryPreview.style.backgroundImage = `url(${thumb})`;
      galleryPreview.style.borderColor = 'var(--red)';
      setTimeout(() => { galleryPreview.style.borderColor = 'rgba(255,255,255,0.2)'; }, 800);
    };
  }

  // ── SHUTTER — dispatches by mode ──
  function handleShutter() {
    if (activeMode === 'video') {
      mediaRecorder?.state === 'recording' ? stopVideo() : startVideo();
      return;
    }
    if (isTimerRunning) return;
    if (timerSec === 0) { activeMode === 'dynamic' ? takeDynamicPhoto() : takePhoto(); return; }
    isTimerRunning = true;
    captureBtn.classList.add('timer-running');
    let remaining = timerSec;
    timerDisplay.textContent = remaining;
    timerDisplay.classList.add('show');
    const tick = () => {
      remaining--;
      haptic(6);
      if (remaining <= 0) {
        timerDisplay.classList.remove('show');
        captureBtn.classList.remove('timer-running');
        isTimerRunning = false;
        takePhoto();
      } else {
        timerDisplay.textContent = remaining;
        timerTimeout = setTimeout(tick, 1000);
      }
    };
    timerTimeout = setTimeout(tick, 1000);
  }

  // ── GALLERY BROWSER ──
  function openGallery(startIdx) {
    if (!gallery.length) return;
    galIdx = Math.max(0, Math.min(startIdx, gallery.length - 1));
    showGalleryItem();
    galleryOverlay.classList.add('open');
  }

  function showGalleryItem(dir) {
    const item = gallery[galIdx];
    const img = galleryImg;
    if (dir) {
      img.classList.remove('slide-left', 'slide-right');
      void img.offsetWidth; // minimal reflow only here, unavoidable for animation restart
      img.classList.add(dir === 1 ? 'slide-left' : 'slide-right');
    }
    img.src = item.thumbUrl || item.dataUrl;
    galleryCounter.textContent = `${galIdx + 1} / ${gallery.length}`;
    // show video indicator overlay
    galSave.dataset.href = item.dataUrl;
    galSave.dataset.name = item.name;
  }

  galPrev.addEventListener('click', () => {
    if (galIdx <= 0) return;
    galIdx--; showGalleryItem(-1); haptic(6);
  });
  galNext.addEventListener('click', () => {
    if (galIdx >= gallery.length - 1) return;
    galIdx++; showGalleryItem(1); haptic(6);
  });
  galDelete.addEventListener('click', () => {
    haptic(15);
    gallery.splice(galIdx, 1);
    photoCount = gallery.length;
    countNum.textContent = photoCount;
    countBadge.textContent = photoCount;
    if (!gallery.length) { galleryOverlay.classList.remove('open'); return; }
    galIdx = Math.min(galIdx, gallery.length - 1);
    showGalleryItem();
  });
  galSave.addEventListener('click', () => {
    haptic(10);
    const item = gallery[galIdx];
    const a = document.createElement('a');
    a.href = item.dataUrl; a.download = item.name; a.click();
  });
  galleryClose.addEventListener('click', () => {
    galleryOverlay.classList.remove('open');
    haptic(8);
  });

  // swipe gallery with touch
  let galSwipeX0 = null;
  $('gallery-track').addEventListener('touchstart', e => { galSwipeX0 = e.touches[0].clientX; }, { passive: true });
  $('gallery-track').addEventListener('touchend', e => {
    if (galSwipeX0 === null) return;
    const dx = e.changedTouches[0].clientX - galSwipeX0;
    galSwipeX0 = null;
    if (Math.abs(dx) < 40) return;
    dx < 0 ? galNext.click() : galPrev.click();
  }, { passive: true });

  // open gallery from thumbnail
  galleryPreview.addEventListener('click', () => {
    if (!gallery.length) return;
    openGallery(gallery.length - 1);
  });

  // ── LEGACY REVIEW (kept for quick last-shot review from close btn) ──
  closeReviewBtn.addEventListener('click', () => reviewOverlay.classList.remove('open'));
  saveReviewBtn.addEventListener('click', () => {
    if (!lastImageData) return;
    const a = document.createElement('a'); a.href = lastImageData; a.download = lastDownloadName; a.click();
  });

  // ── SWITCH CAMERA ──
  switchCameraBtn.addEventListener('click', () => {
    haptic(10);
    switchCameraBtn.classList.remove('flipping');
    requestAnimationFrame(() => {
      switchCameraBtn.classList.add('flipping');
      setTimeout(() => switchCameraBtn.classList.remove('flipping'), 400);
    });
    if (mediaRecorder?.state === 'recording') stopVideo();
    useFront = !useFront;
    initCamera();
  });

  // ── RESIZE ──
  let resizeTimer = null;
  window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(applyAspectMask, 120); }, { passive: true });

  startCameraBtn.addEventListener('click', initCamera);
  captureBtn.addEventListener('click', handleShutter);
  window.addEventListener('load', initCamera);
  </script>
</body>

</html>
