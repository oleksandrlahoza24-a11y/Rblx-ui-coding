<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAM — Pro Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --amber: #fd0000;
      --amber-dim: #3b0000;
      --amber-glow: #950000;
      --red: #d20000;
      --panel: #000000;
      --panel-border: rgba(255, 255, 255, 0.08);
      --glass: #4d0000;
      --text: #ffffff;
      --text-dim: #ffffff;
      --mono: 'Syne Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 30px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: var(--sans);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /* ── VIEWFINDER ── */
    #viewfinder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── ASPECT MASK ── */
    #aspect-mask-top,
    #aspect-mask-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      background: #000;
      z-index: 2;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #aspect-mask-top {
      top: 0;
    }

    #aspect-mask-bottom {
      bottom: 0;
    }

    /* ── GRID OVERLAY ── */
    #grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #grid-overlay.visible {
      opacity: 1;
    }

    #grid-overlay svg {
      width: 100%;
      height: 100%;
    }

    /* ── AE/AF FOCUS RING ── */
    #focus-ring {
      position: absolute;
      z-index: 4;
      width: 70px;
      height: 70px;
      border: 1.5px solid var(--amber);
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.5);
      will-change: transform, opacity;
      transition: opacity 0.16s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #focus-ring::before,
    #focus-ring::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
    }

    #focus-ring::before {
      top: -4px;
      left: -4px;
      border-top: 2px solid var(--amber);
      border-left: 2px solid var(--amber);
    }

    #focus-ring::after {
      bottom: -4px;
      right: -4px;
      border-bottom: 2px solid var(--amber);
      border-right: 2px solid var(--amber);
    }

    #focus-ring.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #focus-ring.locked {
      border-color: var(--amber);
      animation: lock-pulse 2s ease infinite;
    }

    @keyframes lock-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 var(--amber-glow);
      }

      50% {
        box-shadow: 0 0 0 6px transparent;
      }
    }

    /* ── AE LOCK BADGE ── */
    #ae-lock-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--amber);
      color: #000;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 4px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #ae-lock-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FLASH ── */
    #flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #ffffff 0%, #fffbe6 60%, #fff8d0 100%);
      opacity: 0;
      z-index: 6;
      pointer-events: none;
      transition: opacity 0.06s ease-out;
    }

    /* ── OVERLAY PERMISSION ── */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      text-align: center;
      padding: 40px;
    }

    #overlay .cam-logo {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--amber);
      margin-bottom: 32px;
    }

    #overlay h1 {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 26px;
      margin-bottom: 10px;
    }

    #overlay p {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    #overlay button {
      padding: 14px 32px;
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    #overlay button:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    /* ── REVIEW OVERLAY ── */
    #review-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    #review-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #review-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 6px;
    }

    #review-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 32px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .review-btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--panel-border);
      padding: 11px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.18s ease, box-shadow 0.18s ease;
      backdrop-filter: blur(12px);
    }

    /* close: slides left and shrinks */
    #close-review-btn:active {
      transform: translateX(-6px) scale(0.92);
    }

    /* save: bounces up like a save-to-cloud lift */
    #save-review-btn:active {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 8px 20px rgba(253, 0, 0, 0.3);
    }

    .review-btn.save {
      color: var(--amber);
      border-color: var(--amber-glow);
    }

    /* ── TOP INFO BAR ── */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 52px 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
    }

    .top-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-pill {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--panel-border);
      color: rgba(255, 255, 255, 0.6);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ratio btn: squish horizontally */
    #ratio-btn:active {
      transform: scaleX(0.82) scaleY(1.08);
    }

    /* grid btn: spin-flash */
    #grid-btn:active {
      transform: rotate(20deg) scale(0.88);
    }

    /* timer btn: stretch up like a countdown tick */
    #timer-btn:active {
      transform: scaleY(0.78) scaleX(1.06);
    }

    .top-pill.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    /* grid active: subtle grid-line shimmer */
    #grid-btn.active {
      animation: grid-shimmer 2.4s linear infinite;
    }

    @keyframes grid-shimmer {

      0%,
      100% {
        box-shadow: 0 0 0 0 transparent;
      }

      50% {
        box-shadow: 0 0 8px 1px var(--amber-glow);
      }
    }

    /* timer active: pulse like a heartbeat */
    #timer-btn.active {
      animation: timer-heartbeat 1s ease infinite;
    }

    @keyframes timer-heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      14% {
        transform: scale(1.1);
      }

      28% {
        transform: scale(1);
      }

      42% {
        transform: scale(1.06);
      }

      56% {
        transform: scale(1);
      }
    }

    #photo-counter {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
    }

    #photo-counter span {
      color: var(--text);
    }

    /* ── ZOOM BAR ── */
    #zoom-bar {
      position: absolute;
      left: 50%;
      bottom: 185px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 30px;
      transition: opacity var(--transition);
    }

    #zoom-bar.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #zoom-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 0.12em;
      min-width: 36px;
      text-align: right;
    }

    #zoom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #zoom-slider::-webkit-slider-thumb:active {
      transform: scale(1.3);
    }

    /* ── TIMER COUNTDOWN ── */
    #timer-display {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 80px;
      color: var(--amber);
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 40px var(--amber-glow);
      transition: opacity 0.2s ease;
    }

    #timer-display.show {
      opacity: 1;
    }

    /* ── BOTTOM CONTROLS ── */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 0 50px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75), transparent);
      z-index: 10;
    }

    /* mode strip */
    #mode-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin-bottom: 18px;
      position: relative;
    }

    .mode-tab {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.45);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: color 0.22s ease, background 0.22s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mode-tab:active {
      transform: scale(0.92);
    }

    .mode-tab.active {
      color: var(--amber);
      background: var(--amber-dim);
      transform: scale(1.08);
    }

    .mode-tab[data-mode="dynamic"] {
      color: rgba(255, 180, 0, 0.5);
    }

    .mode-tab[data-mode="dynamic"].active {
      color: #ffb400;
      background: rgba(255, 180, 0, 0.15);
    }

    /* shutter row */
    #shutter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
    }

    /* thumbnail */
    #thumb-wrap {
      width: 52px;
      height: 52px;
      position: relative;
    }

    #galleryPreview {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: #222;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    #galleryPreview:active {
      transform: scale(0.88) rotate(-4deg);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    #galleryPreview.flash-in {
      animation: thumb-pop 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes thumb-pop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.18) rotate(3deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    #photo-count-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-family: var(--mono);
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #photo-count-badge.show {
      opacity: 1;
      transform: scale(1);
    }

    /* shutter */
    #captureBtn {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: transparent;
      border: 2.5px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 0 5px #000, inset 0 0 0 8px rgba(255, 255, 255, 0.9), 0 0 0 0 rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }




    #captureBtn::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }




    #captureBtn.ripple::before {
      inset: -18px;
      border-color: rgba(255, 255, 255, 0.12);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }




    #captureBtn::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }




    #captureBtn:active {
      transform: scale(0.91);
      box-shadow: inset 0 0 0 5px #000, inset 0 0 0 8px rgba(255, 255, 255, 0.6), 0 0 22px rgba(255, 255, 255, 0.18);
    }




    #captureBtn:active::after {
      background: #bbb;
      transform: scale(0.84);
    }

    #captureBtn.recording {
      border-color: var(--red);
    }

    #captureBtn.recording::after {
      background: var(--red);
      border-radius: 6px;
    }

    #captureBtn.timer-running {
      animation: timer-pulse 1s ease infinite;
    }

    @keyframes timer-pulse {

      0%,
      100% {
        box-shadow: inset 0 0 0 5px #000, inset 0 0 0 7px rgba(255, 255, 255, 0.85), 0 0 0 0 var(--amber-glow);
      }

      50% {
        box-shadow: inset 0 0 0 5px #000, inset 0 0 0 7px rgba(255, 255, 255, 0.85), 0 0 0 12px transparent;
      }
    }

    /* side icons */
    .side-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(40, 0, 0, 0.6);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      color: rgba(255, 255, 255, 0.8);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    /* switch camera: full Y-axis flip */
    #switchCameraBtn:active {
      transform: rotateY(180deg) scale(0.9);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #switchCameraBtn.flipping {
      animation: cam-flip 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cam-flip {
      0% {
        transform: rotateY(0deg) scale(1);
      }

      45% {
        transform: rotateY(90deg) scale(0.85);
      }

      55% {
        transform: rotateY(90deg) scale(0.85);
      }

      100% {
        transform: rotateY(0deg) scale(1);
      }
    }

    .side-btn.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    /* ── RIGHT RAIL ── */
    #right-rail {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .rail-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      color: rgba(255, 255, 255, 0.7);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    /* torch: flicker press */
    #torch-btn:active {
      transform: scale(0.84) rotate(-8deg);
    }

    /* torch active: warm glow flicker */
    #torch-btn.active {
      animation: torch-flicker 1.8s ease infinite;
      box-shadow: 0 0 14px 2px rgba(255, 200, 60, 0.35);
      border-color: rgba(255, 200, 60, 0.5);
      color: #ffc83c;
    }

    @keyframes torch-flicker {

      0%,
      100% {
        box-shadow: 0 0 12px 2px rgba(255, 200, 60, 0.3);
      }

      25% {
        box-shadow: 0 0 20px 4px rgba(255, 200, 60, 0.5);
      }

      60% {
        box-shadow: 0 0 8px 1px rgba(255, 200, 60, 0.2);
      }

      80% {
        box-shadow: 0 0 18px 3px rgba(255, 200, 60, 0.4);
      }
    }

    /* AE: rotate on press like a lens dial */
    #ae-btn:active {
      transform: scale(0.88) rotate(45deg);
    }

    /* AE active: slow spin */
    #ae-btn.active {
      animation: ae-spin 4s linear infinite;
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    @keyframes ae-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .rail-btn.active {
      color: var(--amber);
      border-color: var(--amber-glow);
      background: var(--amber-dim);
    }

    .rail-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── EXPOSURE BAR ── */
    #expo-bar {
      position: absolute;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      padding: 12px 10px;
      border-radius: 24px;
      transition: opacity 0.22s ease;
    }

    #expo-bar.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #expo-bar svg {
      color: var(--amber);
    }

    #expo-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 2px;
      height: 100px;
    }

    #expo-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #expo-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--amber);
      letter-spacing: 0.1em;
    }

    /* ── QUALITY PILL ── */
    #quality-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
    }

    /* ── KEYBOARD HINT ── */
    #kbd-hint {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.12em;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <video id="viewfinder" autoplay playsinline muted></video>
  <canvas id="photoCanvas" class="hidden"></canvas>

  <div id="aspect-mask-top"></div>
  <div id="aspect-mask-bottom"></div>

  <div id="grid-overlay">
    <svg preserveAspectRatio="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <line x1="33.3" y1="0" x2="33.3" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="0.15" />
      <line x1="66.6" y1="0" x2="66.6" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="0.15" />
      <line x1="0" y1="33.3" x2="100" y2="33.3" stroke="rgba(255,255,255,0.25)" stroke-width="0.15" />
      <line x1="0" y1="66.6" x2="100" y2="66.6" stroke="rgba(255,255,255,0.25)" stroke-width="0.15" />
    </svg>
  </div>

  <div id="focus-ring"></div>
  <div id="ae-lock-badge">AE/AF LOCK</div>

  <div id="flash"></div>
  <div id="timer-display">3</div>

  <!-- TOP BAR -->
  <div id="top-bar">
    <div class="top-cluster">
      <div class="top-pill" id="ratio-btn">4:3</div>
      <div class="top-pill" id="grid-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:3px">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>GRID
      </div>
      <div class="top-pill" id="timer-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px">
          <circle cx="12" cy="13" r="8" />
          <polyline points="12 9 12 13 14.5 15" />
          <line x1="9" y1="2" x2="15" y2="2" />
        </svg><span id="timer-label">OFF</span>
      </div>
      <div class="top-pill" id="quality-btn">PNG</div>
    </div>
    <div id="photo-counter"><span id="count-num">0</span> SHOTS</div>
  </div>

  <div id="kbd-hint">SPACE · CAPTURE</div>

  <!-- ZOOM BAR -->
  <div id="zoom-bar" class="hidden">
    <span id="zoom-label">1.0×</span>
    <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
  </div>

  <!-- RIGHT RAIL -->
  <div id="right-rail">
    <div class="rail-btn" id="torch-btn" title="Torch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6c0-2.21-2.69-4-6-4S6 3.79 6 6l1 7h10l1-7z" />
        <path d="M7 13l-.5 3.5A1 1 0 0 0 7.5 18h9a1 1 0 0 0 .99-1.14L17 13" />
        <line x1="12" y1="18" x2="12" y2="22" />
      </svg>
    </div>
    <div class="rail-label">TORCH</div>
    <div class="rail-btn" id="ae-btn" title="Exposure">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="2" x2="12" y2="4" />
        <line x1="12" y1="20" x2="12" y2="22" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="2" y1="12" x2="4" y2="12" />
        <line x1="20" y1="12" x2="22" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </div>
    <div class="rail-label">AE</div>
    <div class="rail-btn" id="expo-btn" title="Exposure Adjust">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="9" y1="12" x2="15" y2="12" />
        <line x1="12" y1="9" x2="12" y2="15" />
        <line x1="9" y1="17" x2="15" y2="17" />
      </svg>
    </div>
    <div class="rail-label">EV</div>
  </div>

  <!-- EXPOSURE SLIDER -->
  <div id="expo-bar" class="hidden">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round">
      <circle cx="12" cy="12" r="4" />
      <line x1="12" y1="2" x2="12" y2="5" />
      <line x1="12" y1="19" x2="12" y2="22" />
      <line x1="2" y1="12" x2="5" y2="12" />
      <line x1="19" y1="12" x2="22" y2="12" />
    </svg>
    <input type="range" id="expo-slider" min="-2" max="2" step="0.1" value="0">
    <span id="expo-label">0.0</span>
  </div>

  <!-- REVIEW OVERLAY -->
  <div id="review-overlay">
    <img id="review-img" src="" alt="Last photo">
    <div id="review-bar">
      <button class="review-btn" id="close-review-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        CLOSE
      </button>
      <button class="review-btn save" id="save-review-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        SAVE
      </button>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div id="mode-strip">
      <div class="mode-tab" data-mode="video">VIDEO</div>
      <div class="mode-tab active" data-mode="photo">PHOTO</div>
      <div class="mode-tab" data-mode="portrait">PORTRAIT</div>
      <div class="mode-tab" data-mode="dynamic">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"
          style="display:inline;vertical-align:middle;margin-right:3px">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
        </svg>DYNAMIC
      </div>
    </div>
    <div id="shutter-row">
      <div id="thumb-wrap">
        <div id="galleryPreview" title="Review last photo"></div>
        <div id="photo-count-badge" id="photo-count-badge">0</div>
      </div>
      <button id="captureBtn" title="Capture"></button>
      <button class="side-btn" id="switchCameraBtn" title="Flip Camera">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </div>

  <!-- PERMISSION OVERLAY -->
  <div id="overlay">
    <div class="cam-logo">CAM · PRO</div>
    <h1>Camera Access</h1>
    <p>Grant permission to begin.<br>Make sure you're on HTTPS.</p>
    <button id="startCameraBtn">Allow Camera</button>
  </div>

  <script>
    'use strict';

  // ── DOM REFS (single lookup) ──
  const $ = id => document.getElementById(id);
  const viewfinder     = $('viewfinder');
  const photoCanvas    = $('photoCanvas');
  const captureBtn     = $('captureBtn');
  const switchCameraBtn= $('switchCameraBtn');
  const galleryPreview = $('galleryPreview');
  const flash          = $('flash');
  const overlay        = $('overlay');
  const startCameraBtn = $('startCameraBtn');
  const gridOverlay    = $('grid-overlay');
  const gridBtn        = $('grid-btn');
  const ratioBtn       = $('ratio-btn');
  const timerBtn       = $('timer-btn');
  const timerLabel     = $('timer-label');
  const timerDisplay   = $('timer-display');
  const maskTop        = $('aspect-mask-top');
  const maskBottom     = $('aspect-mask-bottom');
  const zoomBar        = $('zoom-bar');
  const zoomSlider     = $('zoom-slider');
  const zoomLabel      = $('zoom-label');
  const focusRing      = $('focus-ring');
  const aeLockBadge    = $('ae-lock-badge');
  const aeBtn          = $('ae-btn');
  const torchBtn       = $('torch-btn');
  const expoBtn        = $('expo-btn');
  const expoBar        = $('expo-bar');
  const expoSlider     = $('expo-slider');
  const expoLabelEl    = $('expo-label');
  const countNum       = $('count-num');
  const countBadge     = $('photo-count-badge');
  const reviewOverlay  = $('review-overlay');
  const reviewImg      = $('review-img');
  const closeReviewBtn = $('close-review-btn');
  const saveReviewBtn  = $('save-review-btn');
  const qualityBtn     = $('quality-btn');
  const kbdHint        = $('kbd-hint');
  const modeTabs       = document.querySelectorAll('.mode-tab');

  // ── STATE ──
  let currentStream   = null;
  let useFront        = false;
  let showGrid        = false;
  let timerSec        = 0;
  let timerTimeout    = null;
  let isTimerRunning  = false;
  let photoCount      = 0;
  let lastImageData   = null;
  let lastDownloadName= '';
  let aeLocked        = false;
  let torchOn         = false;
  let currentTrack    = null;
  let activeMode      = 'photo';
  let expoVisible     = false;
  let zoomRafId       = null;
  let pendingZoom     = null;

  const ratios      = ['4:3', '16:9', '1:1'];
  const timerStates = [0, 3, 10];
  const qualities   = ['PNG', 'JPG', 'WEBP'];
  const qualityMime = { PNG: 'image/png', JPG: 'image/jpeg', WEBP: 'image/webp' };
  const qualityExt  = { PNG: 'png', JPG: 'jpg', WEBP: 'webp' };
  let ratioIdx   = 0;
  let timerIdx   = 0;
  let qualityIdx = 0;

  // ── HAPTIC ──
  function haptic(ms = 8) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  // ── ASPECT RATIO MASKS ──
  function applyAspectMask() {
    const ratio = ratios[ratioIdx];
    const vw = window.innerWidth, vh = window.innerHeight;
    let bar = 0;
    if (ratio === '16:9') bar = Math.max(0, (vh - vw * 9 / 16) / 2);
    else if (ratio === '1:1') bar = Math.max(0, (vh - vw) / 2);
    maskTop.style.height = bar + 'px';
    maskBottom.style.height = bar + 'px';
  }

  ratioBtn.addEventListener('click', () => {
    haptic();
    ratioIdx = (ratioIdx + 1) % ratios.length;
    ratioBtn.textContent = ratios[ratioIdx];
    applyAspectMask();
  });

  // ── GRID ──
  gridBtn.addEventListener('click', () => {
    haptic();
    showGrid = !showGrid;
    gridOverlay.classList.toggle('visible', showGrid);
    gridBtn.classList.toggle('active', showGrid);
  });

  // ── TIMER ──
  timerBtn.addEventListener('click', () => {
    haptic();
    timerIdx = (timerIdx + 1) % timerStates.length;
    timerSec = timerStates[timerIdx];
    timerLabel.textContent = timerSec === 0 ? 'OFF' : timerSec + 'S';
    timerBtn.classList.toggle('active', timerSec > 0);
  });

  // ── QUALITY ──
  qualityBtn.addEventListener('click', () => {
    haptic();
    qualityIdx = (qualityIdx + 1) % qualities.length;
    qualityBtn.textContent = qualities[qualityIdx];
  });

  // ── EXPOSURE SLIDER ──
  expoBtn.addEventListener('click', () => {
    haptic();
    expoVisible = !expoVisible;
    expoBar.classList.toggle('hidden', !expoVisible);
    expoBtn.classList.toggle('active', expoVisible);
  });

  expoSlider.addEventListener('input', () => {
    const v = parseFloat(expoSlider.value).toFixed(1);
    expoLabelEl.textContent = (v >= 0 ? '+' : '') + v;
    // CSS filter to simulate EV (no native API on most browsers)
    const brightness = 1 + parseFloat(v) * 0.3;
    viewfinder.style.filter = `brightness(${brightness})`;
  }, { passive: true });

  // ── ZOOM (RAF-throttled) ──
  function applyZoom(val) {
    if (!currentTrack?.getCapabilities) return;
    try {
      const caps = currentTrack.getCapabilities();
      if (!caps.zoom) return;
      const mapped = caps.zoom.min + ((val - 1) / 4) * (caps.zoom.max - caps.zoom.min);
      currentTrack.applyConstraints({ advanced: [{ zoom: mapped }] });
    } catch(_) {}
  }

  viewfinder.addEventListener('touchstart', () => {
    zoomBar.classList.remove('hidden');
  }, { passive: true });

  zoomSlider.addEventListener('input', () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.textContent = val.toFixed(1) + '×';
    pendingZoom = val;
    if (!zoomRafId) {
      zoomRafId = requestAnimationFrame(() => {
        applyZoom(pendingZoom);
        zoomRafId = null;
      });
    }
  }, { passive: true });

  // ── PINCH TO ZOOM ──
  let pinchDist0 = 0, zoomVal0 = 1;
  viewfinder.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist0 = Math.hypot(dx, dy);
      zoomVal0 = parseFloat(zoomSlider.value);
      zoomBar.classList.remove('hidden');
    }
  }, { passive: true });

  viewfinder.addEventListener('touchmove', e => {
    if (e.touches.length !== 2 || !pinchDist0) return;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = dist / pinchDist0;
    const newZoom = Math.min(5, Math.max(1, zoomVal0 * scale));
    zoomSlider.value = newZoom;
    zoomLabel.textContent = newZoom.toFixed(1) + '×';
    pendingZoom = newZoom;
    if (!zoomRafId) {
      zoomRafId = requestAnimationFrame(() => {
        applyZoom(pendingZoom);
        zoomRafId = null;
      });
    }
  }, { passive: true });

  // ── CONSOLIDATED VIEWFINDER CLICK (tap-focus + double-tap AE lock) ──
  let focusHideTimeout = null;
  let lastTap = 0;

  viewfinder.addEventListener('click', e => {
    const now = Date.now();
    const isDoubleTap = (now - lastTap) < 320;
    lastTap = now;

    if (isDoubleTap) {
      // double-tap = toggle AE/AF lock
      aeLocked = !aeLocked;
      aeBtn.classList.toggle('active', aeLocked);
      aeLockBadge.classList.toggle('visible', aeLocked);
      if (aeLocked) {
        focusRing.style.left = e.clientX + 'px';
        focusRing.style.top  = e.clientY + 'px';
        focusRing.classList.add('active', 'locked');
      } else {
        focusRing.classList.remove('locked', 'active');
        aeLockBadge.classList.remove('visible');
      }
      return;
    }

    // single tap = focus point
    if (aeLocked) {
      aeLocked = false;
      aeBtn.classList.remove('active');
      aeLockBadge.classList.remove('visible');
      focusRing.classList.remove('locked');
    }
    focusRing.style.left = e.clientX + 'px';
    focusRing.style.top  = e.clientY + 'px';
    focusRing.classList.add('active');
    focusRing.classList.remove('locked');
    clearTimeout(focusHideTimeout);
    focusHideTimeout = setTimeout(() => focusRing.classList.remove('active'), 1800);
  });

  // ── AE BUTTON ──
  aeBtn.addEventListener('click', () => {
    haptic();
    aeLocked = !aeLocked;
    aeBtn.classList.toggle('active', aeLocked);
    aeLockBadge.classList.toggle('visible', aeLocked);
    if (!aeLocked) focusRing.classList.remove('locked', 'active');
  });

  // ── TORCH ──
  torchBtn.addEventListener('click', async () => {
    if (!currentTrack) return;
    try {
      const caps = currentTrack.getCapabilities();
      if (!caps.torch) { torchBtn.style.opacity = '0.3'; return; }
      torchOn = !torchOn;
      await currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
      torchBtn.classList.toggle('active', torchOn);
      haptic(torchOn ? 15 : 8);
    } catch(_) { torchBtn.style.opacity = '0.3'; }
  });

  // ── MODE TABS ──
  modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      haptic();
      modeTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeMode = tab.dataset.mode;
    });
  });

  // ── KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.code === 'Space') { e.preventDefault(); handleShutter(); }
    if (e.code === 'KeyG')  gridBtn.click();
    if (e.code === 'KeyF')  viewfinder.click();
    if (e.code === 'KeyT')  torchBtn.click();
  });

  // hide keyboard hint after first use
  document.addEventListener('keydown', () => {
    kbdHint.style.opacity = '0';
  }, { once: true });

  // ── INIT CAMERA ──
  async function initCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    const constraints = {
      video: {
        facingMode: useFront ? 'user' : 'environment',
        width: { ideal: 3840 }, height: { ideal: 2160 }
      }, audio: false
    };
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      currentStream = stream;
      viewfinder.srcObject = stream;
      currentTrack = stream.getVideoTracks()[0];
      overlay.classList.add('hidden');
      viewfinder.style.transform = useFront ? 'scaleX(-1)' : 'scaleX(1)';
      applyAspectMask();
    } catch(err) {
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <div class="cam-logo">CAM · PRO</div>
        <h1>Camera Error</h1>
        <p>${err.message}</p>
        <button onclick="location.reload()">Try Again</button>
      `;
    }
  }

  // ── CAPTURE HELPERS ──
  function _getQualityArgs() {
    const q = qualities[qualityIdx];
    const mime = qualityMime[q];
    const ext  = qualityExt[q];
    const qual = q === 'JPG' ? 0.92 : undefined;
    return { mime, ext, qual };
  }

  function _drawFrame(ctx, w, h) {
    if (useFront) {
      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(viewfinder, 0, 0, w, h);
    if (useFront) ctx.restore();
  }

  function _finaliseCapture(dataUrl, prefix, ext) {
    lastImageData = dataUrl;
    lastDownloadName = `${prefix}_${Date.now()}.${ext}`;
    photoCount++;
    countNum.textContent = photoCount;
    countBadge.textContent = photoCount;
    countBadge.classList.add('show');
    galleryPreview.style.backgroundImage = `url(${dataUrl})`;
    galleryPreview.style.borderColor = 'var(--amber)';
    // restart animation without reflow – swap class via rAF
    galleryPreview.classList.remove('flash-in');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        galleryPreview.classList.add('flash-in');
        setTimeout(() => {
          galleryPreview.style.borderColor = 'rgba(255,255,255,0.2)';
          galleryPreview.classList.remove('flash-in');
        }, 600);
      });
    });
  }

  // ── TAKE PHOTO ──
  function takePhoto() {
    if (!currentStream) return;
    haptic(12);
    captureBtn.classList.add('ripple');
    setTimeout(() => captureBtn.classList.remove('ripple'), 520);
    flash.style.opacity = 1;
    setTimeout(() => { flash.style.opacity = 0; }, 75);

    const { mime, ext, qual } = _getQualityArgs();
    const w = viewfinder.videoWidth, h = viewfinder.videoHeight;
    photoCanvas.width = w;
    photoCanvas.height = h;
    const ctx = photoCanvas.getContext('2d', { willReadFrequently: false });
    _drawFrame(ctx, w, h);
    _finaliseCapture(photoCanvas.toDataURL(mime, qual), 'CAM', ext);
  }

  // ── DYNAMIC PHOTO ──
  function takeDynamicPhoto() {
    if (!currentStream || isTimerRunning) return;
    haptic(20);
    const TOTAL = 5, INTERVAL = 80;
    const w = viewfinder.videoWidth, h = viewfinder.videoHeight;
    const frames = [];
    captureBtn.classList.add('timer-running');
    let f = 0;
    const burst = setInterval(() => {
      // reuse a single offscreen scratch canvas per frame
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      _drawFrame(c.getContext('2d'), w, h);
      frames.push(c);
      if (++f >= TOTAL) {
        clearInterval(burst);
        captureBtn.classList.remove('timer-running');
        _composeDynamic(frames, w, h);
      }
    }, INTERVAL);
  }

  function _composeDynamic(frames, w, h) {
    flash.style.opacity = 0.5;
    setTimeout(() => { flash.style.opacity = 0; }, 100);
    const { mime, ext, qual } = _getQualityArgs();
    photoCanvas.width = w;
    photoCanvas.height = h;
    const ctx = photoCanvas.getContext('2d', { willReadFrequently: false });
    ctx.drawImage(frames[0], 0, 0);
    for (let i = 1; i < frames.length; i++) {
      ctx.globalAlpha = 0.28 + (i / frames.length) * 0.45;
      ctx.drawImage(frames[i], 0, 0);
    }
    ctx.globalAlpha = 1;
    _finaliseCapture(photoCanvas.toDataURL(mime, qual), 'CAM_DYN', ext);
  }

  // ── SHUTTER ──
  function handleShutter() {
    if (isTimerRunning) return;
    if (timerSec === 0) {
      activeMode === 'dynamic' ? takeDynamicPhoto() : takePhoto();
      return;
    }
    isTimerRunning = true;
    captureBtn.classList.add('timer-running');
    let remaining = timerSec;
    timerDisplay.textContent = remaining;
    timerDisplay.classList.add('show');
    const tick = () => {
      remaining--;
      haptic(6);
      if (remaining <= 0) {
        timerDisplay.classList.remove('show');
        captureBtn.classList.remove('timer-running');
        isTimerRunning = false;
        takePhoto();
      } else {
        timerDisplay.textContent = remaining;
        timerTimeout = setTimeout(tick, 1000);
      }
    };
    timerTimeout = setTimeout(tick, 1000);
  }

  // ── REVIEW ──
  galleryPreview.addEventListener('click', () => {
    if (!lastImageData) return;
    reviewImg.src = lastImageData;
    reviewOverlay.classList.add('open');
  });
  closeReviewBtn.addEventListener('click', () => reviewOverlay.classList.remove('open'));
  saveReviewBtn.addEventListener('click', () => {
    if (!lastImageData) return;
    const a = document.createElement('a');
    a.href = lastImageData;
    a.download = lastDownloadName;
    a.click();
  });

  // ── SWITCH CAMERA ──
  switchCameraBtn.addEventListener('click', () => {
    haptic(10);
    switchCameraBtn.classList.remove('flipping');
    requestAnimationFrame(() => {
      switchCameraBtn.classList.add('flipping');
      setTimeout(() => switchCameraBtn.classList.remove('flipping'), 400);
    });
    useFront = !useFront;
    initCamera();
  });

  // ── RESIZE (debounced) ──
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(applyAspectMask, 120);
  }, { passive: true });

  startCameraBtn.addEventListener('click', initCamera);
  captureBtn.addEventListener('click', handleShutter);
  window.addEventListener('load', initCamera);
  </script>
</body>

</html>
